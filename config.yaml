# QuantStar — Qwen3.6-27B quantized inference
model:
  repo: "Qwen/Qwen3.6-27B"
  cache_dir: "./models"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"   # load-time value; quantize.py overrides to "quantstar" (blockwise GQA) post-load.

inference:
  max_new_tokens: 65536
  temperature: 0.7
  top_p: 0.8
  top_k: 20

server:
  host: "127.0.0.1"
  port: 9898

logging:
  level: "INFO"
